name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: build + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          check-latest: true
          # cmdgo has no external deps (no go.sum), so setup-go's
          # go.sum-keyed module cache adds no value and emits a noisy
          # "dependencies file not found" warning.
          cache: false

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt would reformat:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...
