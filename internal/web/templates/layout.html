{{define "layout"}}<!doctype html>
<html lang="en" class="bg-zinc-950">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cmdgo — {{.Title}}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛰️</text></svg>">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-cmd-bg: #0a0b0e;
      --color-cmd-panel: #111317;
      --color-cmd-line: #1f232a;
      --color-cmd-text: #e6e9ef;
      --color-cmd-muted: #8a93a3;
      --color-cmd-accent: #6ee7b7;
    }
    body { @apply bg-cmd-bg text-cmd-text; }
    .panel { @apply bg-cmd-panel rounded-lg border border-cmd-line; }
    .chip { @apply inline-flex items-center px-2 py-0.5 rounded text-xs font-medium; }
    button.btn { @apply inline-flex items-center gap-1 px-3 py-1.5 rounded text-sm font-medium border border-cmd-line bg-cmd-panel hover:border-cmd-accent transition; }
    button.btn-primary { @apply bg-cmd-accent text-cmd-bg border-cmd-accent hover:bg-emerald-400; }
    button.btn-danger:hover { @apply border-rose-500 text-rose-300; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx-ext-sse@2.2.4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js"></script>

  <link rel="stylesheet" href="/static/styles.css">

  <script>
    // Bootstrap the proxy token: prefer ?token=...; else localStorage;
    // else show the auth prompt. We strip the token from the URL once
    // captured so a bookmark doesn't leak it forever.
    (function () {
      const url = new URL(location.href);
      const fromQuery = url.searchParams.get('token');
      if (fromQuery) {
        localStorage.setItem('cmdgoToken', fromQuery);
        url.searchParams.delete('token');
        history.replaceState({}, '', url.toString());
      }
    })();

    function cmdgoToken() { return localStorage.getItem('cmdgoToken') || ''; }

    // Inject the bearer into every HTMX request automatically.
    document.body && document.body.addEventListener('htmx:configRequest', (e) => {
      const t = cmdgoToken();
      if (t) e.detail.headers['Authorization'] = 'Bearer ' + t;
    });
    // Pre-DOMContentLoaded path: re-bind once Alpine inits the body.
    document.addEventListener('DOMContentLoaded', () => {
      document.body.addEventListener('htmx:configRequest', (e) => {
        const t = cmdgoToken();
        if (t) e.detail.headers['Authorization'] = 'Bearer ' + t;
      });
    });
  </script>
</head>
<body class="min-h-screen" hx-ext="sse">
  {{template "content" .}}
</body>
</html>
{{end}}
